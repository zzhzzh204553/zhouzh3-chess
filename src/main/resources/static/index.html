<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>中国象棋</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">
    <div class="board-panel">
        <div class="board" id="board"></div>
    </div>

    <aside class="sidebar">
        <section class="panel">
            <label for="fenInput">输入象棋 FEN 字符串：</label>
            <div class="control-row">
                <input type="text" id="fenInput" value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/2P6/P3P1P1P/1C5C1/9/RNBAKABNR">
                <button type="button" id="renderButton">渲染棋盘</button>
            </div>
        </section>

        <section class="panel">
            <label for="movesInput">输入坐标走子序列：</label>
            <div class="control-row">
                <input type="text" id="movesInput" placeholder="按红方视角坐标，例如 h2e2">
                <button type="button" id="parseMovesButton">解析棋谱</button>
            </div>
        </section>

        <section class="panel move-panel">
            <div class="panel-title">棋谱</div>
            <div class="move-list" id="moveList"></div>
            <div class="history-controls">
                <button type="button" id="startButton">开局</button>
                <button type="button" id="undoButton">后退</button>
                <button type="button" id="redoButton">前进</button>
                <button type="button" id="endButton">终局</button>
            </div>
            <div class="message" id="message"></div>
        </section>
    </aside>
</div>

<script src="rules.js"></script>
<script src="app.js"></script>
</body>
</html>
