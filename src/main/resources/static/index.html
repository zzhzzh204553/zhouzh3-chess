<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>中国象棋</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">
    <aside class="tree-sidebar">
        <section class="panel tree-panel">
            <div class="panel-title">棋谱树</div>
            <div class="tree-list" id="treeList"></div>
        </section>
    </aside>

    <div class="board-panel">
        <div class="board" id="board"></div>
    </div>

    <aside class="sidebar">
        <section class="panel">
            <div class="control-row">
                <input type="text" id="fenInput" placeholder="fen" value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w">
                <input type="text" id="movesInput" placeholder="棋谱">
                <button type="button" id="applyButton">确定</button>
                <button type="button" id="cancelButton">清空</button>
            </div>
            <div class="control-row">
                <input type="file" id="imageInput" accept="image/*">
                <button type="button" id="imageApplyButton">上传图片</button>
            </div>
            <div class="control-row">
                <!--            <label for="currentFenDisplay" class="sub-label"></label>-->
                <input type="text" id="currentFenDisplay" readonly style="width: 100%;">
            </div>
        </section>


        <section class="panel move-panel">
            <!--            <div class="panel-title">棋谱</div>-->
            <div class="move-list" id="moveList"></div>
            <div class="history-controls">
                <button type="button" id="startButton">开局</button>
                <button type="button" id="undoButton">后退</button>
                <button type="button" id="redoButton">前进</button>
                <button type="button" id="endButton">终局</button>
            </div>
            <div class="message" id="message"></div>
        </section>
    </aside>
</div>

<script src="rules.js"></script>
<script src="game-tree.js"></script>
<script src="app.js"></script>
</body>
</html>
